<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎯 اسم فامیل — آنلاین</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Vazirmatn',sans-serif;direction:rtl;display:flex;justify-content:center;background:#1a1a2e;}
#app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;}
::-webkit-scrollbar{width:0;}

/* ── رنگ‌های اصلی ── */
:root{
  --red:#E8242A;
  --yellow:#F5D800;
  --green:#18B84A;
  --blue:#1565C0;
  --red-dark:#C0181D;
  --yellow-dark:#C9B000;
  --green-dark:#0F8F35;
  --blue-dark:#0D47A1;
  --text-dark:#1a1a1a;
  --text-light:#fff;
}

/* ── پس‌زمینه پازل ── */
.puzzle-bg{
  position:fixed;inset:0;z-index:0;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  pointer-events:none;
}
.puzzle-bg .pz{opacity:0.12;}
.pz-r{background:var(--red);}
.pz-y{background:var(--yellow);}
.pz-g{background:var(--green);}
.pz-b{background:var(--blue);}

/* ── انیمیشن‌ها ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-9px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes puzzleShine{0%,100%{opacity:.12}50%{opacity:.22}}
@keyframes letterPop{0%{transform:scale(1)}50%{transform:scale(1.15) rotate(-3deg)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(60px) rotate(720deg);opacity:0}}

/* ── کارت پازل ── */
.pz-card{
  border-radius:20px;padding:18px;
  position:relative;overflow:hidden;
  border:3px solid rgba(255,255,255,0.25);
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
}
.pz-card::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 10px,transparent 10px,transparent 20px);
}
.pz-card.red{background:linear-gradient(135deg,var(--red),var(--red-dark));}
.pz-card.yellow{background:linear-gradient(135deg,var(--yellow),var(--yellow-dark));}
.pz-card.green{background:linear-gradient(135deg,var(--green),var(--green-dark));}
.pz-card.blue{background:linear-gradient(135deg,var(--blue),var(--blue-dark));}

/* ── دکمه‌ها ── */
.btn{border:none;border-radius:16px;padding:15px 18px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-weight:800;font-size:15px;width:100%;transition:transform .1s,box-shadow .1s;position:relative;overflow:hidden;letter-spacing:.3px;}
.btn:active{transform:scale(.96);}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent);}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;box-shadow:0 6px 20px rgba(232,36,42,.5),inset 0 1px 0 rgba(255,255,255,.2);}
.btn-yellow{background:linear-gradient(135deg,var(--yellow),var(--yellow-dark));color:var(--text-dark);box-shadow:0 6px 20px rgba(245,216,0,.4),inset 0 1px 0 rgba(255,255,255,.3);}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;box-shadow:0 6px 20px rgba(24,184,74,.5),inset 0 1px 0 rgba(255,255,255,.2);}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;box-shadow:0 6px 20px rgba(21,101,192,.5),inset 0 1px 0 rgba(255,255,255,.2);}
.btn-ghost{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:14px;}
.btn:disabled{opacity:.4;box-shadow:none;cursor:not-allowed;}

/* ── ورودی ── */
.inp{width:100%;border:none;outline:none;background:rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:600;color:#fff;direction:rtl;border:2px solid rgba(255,255,255,.15);position: relative; /* 🟢 اضافه شود */
  z-index: 10;}
.inp::placeholder{color:rgba(255,255,255,.4);}
.inp:focus{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.18);}
.inp-label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:6px;font-weight:600;}

/* ── استاتوس بار ── */
.status-bar{display:flex;justify-content:space-between;padding:14px 22px 0;font-size:12px;font-weight:700;color:rgba(255,255,255,.5);position:relative;z-index:10;}

/* ── بقیه عناصر ── */
.player-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.player-row:last-child{border-bottom:none;}
.avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.3);}
.av-r{background:var(--red);}
.av-y{background:var(--yellow);color:var(--text-dark);}
.av-g{background:var(--green);}
.av-b{background:var(--blue);}
.player-name{flex:1;font-size:14px;font-weight:700;color:#fff;}
.badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:99px;border:2px solid transparent;}
.badge-host{background:rgba(245,216,0,.2);color:var(--yellow);border-color:var(--yellow);}
.badge-ready{background:rgba(24,184,74,.2);color:#4ADE80;border-color:#4ADE80;}
.badge-waiting{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.15);}
.room-code{font-size:38px;font-weight:900;letter-spacing:12px;color:#fff;text-align:center;padding:16px 12px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.toggle-wrap{display:flex;justify-content:space-between;align-items:center;}
.toggle{width:54px;height:30px;border-radius:99px;cursor:pointer;position:relative;transition:background .2s;border:2px solid rgba(255,255,255,.2);}
.toggle.on{background:var(--green);}
.toggle.off{background:rgba(255,255,255,.1);}
.toggle-thumb{position:absolute;top:2px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);transition:all .2s;}
.toggle.on .toggle-thumb{right:2px;}
.toggle.off .toggle-thumb{left:2px;}
.timer-wrap{position:relative;width:64px;height:64px;flex-shrink:0;}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.timer-num{font-size:15px;font-weight:900;line-height:1;color:#fff;}
.timer-unit{font-size:9px;color:rgba(255,255,255,.5);}
.play-header{background:rgba(0,0,0,.5);backdrop-filter:blur(12px);border-bottom:2px solid rgba(255,255,255,.1);padding:14px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative;z-index:10;}
.ans-card{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:16px;padding:13px 14px;backdrop-filter:blur(4px);}
.ans-card:focus-within{border-color:rgba(255,255,255,.4);}
.cat-label{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-emoji{font-size:20px;}
.cat-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.8);}
.score-btns{display:flex;gap:8px;margin-top:10px;}
.score-btn{flex:1;border-radius:12px;padding:10px 4px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-weight:700;border:2px solid rgba(255,255,255,.15);transition:all .15s;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72px;-webkit-tap-highlight-color:rgba(255,255,255,.1);}
.score-btn .sb-emoji{font-size:18px;margin-bottom:3px;pointer-events:none;}
.score-btn .sb-label{font-size:11px;pointer-events:none;}
.score-btn .sb-pts{font-size:10px;opacity:.7;margin-top:2px;pointer-events:none;}
.results-table{width:100%;border-collapse:collapse;font-size:12px;}
.results-table th{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-weight:700;padding:9px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.1);}
.results-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.06);color:#fff;vertical-align:top;}
.results-table tr:last-child td{border-bottom:none;}
.lb-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:18px;margin-bottom:8px;border:3px solid transparent;}
.lb-row.rank-1{background:linear-gradient(135deg,rgba(245,216,0,.2),rgba(201,176,0,.15));border-color:var(--yellow);}
.lb-row.rank-2{background:linear-gradient(135deg,rgba(21,101,192,.2),rgba(13,71,161,.15));border-color:var(--blue);}
.lb-row.rank-3{background:linear-gradient(135deg,rgba(24,184,74,.2),rgba(15,143,53,.15));border-color:var(--green);}
.lb-row.rank-other{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);}
.lb-rank{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
.lb-name{flex:1;font-size:15px;font-weight:800;color:#fff;}
.lb-score{font-size:24px;font-weight:900;color:#fff;}
.fab{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;z-index:50;padding:12px 18px 28px;background:linear-gradient(to top,rgba(26,26,46,1) 60%,rgba(26,26,46,0));}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);border:2px solid rgba(255,255,255,.2);color:#fff;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:700;padding:11px 22px;border-radius:99px;z-index:999;white-space:nowrap;animation:popIn .3s ease;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
.finished-banner{border-radius:14px;padding:14px 16px;text-align:center;animation:popIn .4s ease;}
.pass-input-wrap{position:relative;}
.pass-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;}
.wait-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;}
.wait-player{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);}
.wait-player:last-child{border-bottom:none;}

/* ── لوگوی پازل ── */
.logo-puzzle{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:72px;height:72px;border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.lp-r{background:var(--red);}
.lp-y{background:var(--yellow);}
.lp-g{background:var(--green);}
.lp-b{background:var(--blue);}

/* ── حرف دور ── */
.letter-orb{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  border:3px solid rgba(255,255,255,.3);
  animation:letterPop 2s ease-in-out infinite;
}
</style>
</head>
<body>
<!-- پس‌زمینه پازل -->
<div class="puzzle-bg">
  <div class="pz pz-r"></div>
  <div class="pz pz-y"></div>
  <div class="pz pz-g"></div>
  <div class="pz pz-b"></div>
</div>

<div id="app" style="position:relative;z-index:1;">
  <div class="status-bar">
    <span id="time-display">--:--</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button id="btn-home" data-action="go-home" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 4px;opacity:.6;line-height:1;" title="بازگشت به خانه">🏠</button>
      <button id="btn-mute" data-action="toggle-mute" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 4px;opacity:.6;line-height:1;" title="میوت">🔊</button>
    </div>
  </div>
  <div id="screen" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative;"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// صدا با Web Audio API
// ══════════════════════════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
let bgGain = null;
let musicStarted = false;

function unlockAudio() {
  if (AC.state === 'suspended') AC.resume();
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});

// صدای کلیک ساده
function sfxClick() {
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(880, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(440, AC.currentTime+0.08);
  g.gain.setValueAtTime(0.15, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.12);
  o.start(); o.stop(AC.currentTime+0.12);
}

// صدای تایپ (ورودی)
function sfxType() {
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='square';
  o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(1200+Math.random()*400, AC.currentTime);
  g.gain.setValueAtTime(0.04, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.05);
  o.start(); o.stop(AC.currentTime+0.05);
}

// صدای انتخاب امتیاز
function sfxScore(type) {
  const freqs = {correct:[523,659,784], dup:[440,523], wrong:[220,196]};
  const arr = freqs[type]||[440];
  arr.forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type = type==='wrong'?'sawtooth':'sine';
    o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(f, AC.currentTime+i*0.08);
    g.gain.setValueAtTime(0.12, AC.currentTime+i*0.08);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+i*0.08+0.15);
    o.start(AC.currentTime+i*0.08);
    o.stop(AC.currentTime+i*0.08+0.15);
  });
}

// صدای ثبت / تایید
function sfxSubmit() {
  [523,659,784,1047].forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(f, AC.currentTime+i*0.07);
    g.gain.setValueAtTime(0.14, AC.currentTime+i*0.07);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+i*0.07+0.2);
    o.start(AC.currentTime+i*0.07);
    o.stop(AC.currentTime+i*0.07+0.2);
  });
}

// صدای تموم شدن بازی 🎉
function sfxFinish() {
  const melody=[523,659,784,1047,784,1047,1319];
  melody.forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='square'; o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(f, AC.currentTime+i*0.12);
    g.gain.setValueAtTime(0.13, AC.currentTime+i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+i*0.12+0.18);
    o.start(AC.currentTime+i*0.12);
    o.stop(AC.currentTime+i*0.12+0.18);
  });
  // bass drum
  setTimeout(()=>{
    const b=AC.createOscillator(), bg2=AC.createGain();
    b.type='sine'; b.connect(bg2); bg2.connect(AC.destination);
    b.frequency.setValueAtTime(150, AC.currentTime);
    b.frequency.exponentialRampToValueAtTime(40, AC.currentTime+0.3);
    bg2.gain.setValueAtTime(0.3, AC.currentTime);
    bg2.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.3);
    b.start(); b.stop(AC.currentTime+0.3);
  }, 400);
}

// صدای پیوستن بازیکن
function sfxJoin() {
  [330,440,550].forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(f, AC.currentTime+i*0.09);
    g.gain.setValueAtTime(0.1, AC.currentTime+i*0.09);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+i*0.09+0.15);
    o.start(AC.currentTime+i*0.09);
    o.stop(AC.currentTime+i*0.09+0.15);
  });
}

// موزیک پس‌زمینه — ملودی شاد ساده
function startBgMusic() {
  if(musicStarted) return;
  musicStarted=true;
  bgGain = new Audio('/bg-music.mp3');
  bgGain.loop = true;
  bgGain.volume = 0.35;
  bgGain.play().catch(()=>{});
}

function setBgMusicVolume(v) {
  // نسبت: قبلاً ۰.۰۷ بود، الان به ۰.۳۵ نرمال کردیم
  if(bgGain) bgGain.volume = Math.min(1, v * 5);
}

// ══════════════════════════════════════════════════════════════════════════
// state
// ══════════════════════════════════════════════════════════════════════════
const S = {
  ws:null, id:null, isHost:false, code:null,
  room:null, phase:'connect',
  answers:{}, myScoring:{},
  timerLeft:0, timerSec:90, notifTimeout:null,
  _renderedPhase:null,
};

const AVATAR_COLORS=['av-r','av-y','av-g','av-b'];
function avatarClass(idx){return AVATAR_COLORS[idx%4];}

const CAT_EMOJI = {
  'اسم دختر':'👧','اسم پسر':'👦','کشور':'🌍','شهر ایران':'🏙️','حیوان':'🐾','میوه':'🍎',
  'سبزی':'🥦','رنگ':'🎨','غذای ایرانی':'🍲','وسیله نقلیه':'🚗','لباس':'👕','ورزش':'⚽',
  'اسم گل':'🌸','نوشیدنی':'🥤','شیرینی':'🍬','آلت موسیقی':'🎵',
  'چیزی که توی آشپزخانه‌ست':'🍳','چیزی که توی حمام پیدا میشه':'🚿',
  'چیزی که آدم موقع استرس انجام میده':'😤','چیزی که توی پارک میبینی':'🌳',
  'چیزی که شکستنش ناراحت‌کننده‌ست':'💔','چیزی که آدم توی جیبش میذاره':'👜',
  'چیزی که موقع قطع برق لازمه':'🕯️','چیزی که صدای بلندی داره':'📢',
  'چیزی که توی تابستون لازمه':'☀️','یه چیز قرمز':'🔴','یه چیز گرد':'⭕',
  'چیزی که توی دریا هست':'🌊','چیزی که بوی خوبی داره':'🌺','چیزی که گرونه':'💎',
  'چیزی که ارزونه':'💰','یه شغل بامزه':'🤹','چیزی که آدم گم میکنه':'🔍',
  'چیزی که توی زمستون لازمه':'❄️','یه چیز شیرین':'🍯','یه چیز ترش':'🍋',
  'چیزی که توی فرودگاه میبینی':'✈️','اسم درخت':'🌲','غذای فست فود':'🍔',
};

const SCORE_OPTS=[
  {key:'correct',label:'درست',pts:10,color:'#4ADE80',bg:'rgba(24,184,74,.2)',border:'#18B84A',emoji:'✅'},
  {key:'dup',label:'تکراری',pts:5,color:'#F5D800',bg:'rgba(245,216,0,.15)',border:'#C9B000',emoji:'🔁'},
  {key:'wrong',label:'غلط',pts:0,color:'#FF6B6B',bg:'rgba(232,36,42,.2)',border:'#E8242A',emoji:'❌'},
];

const CARD_COLORS=['red','yellow','green','blue'];
function cardColor(i){return CARD_COLORS[i%4];}
const CARD_TEXT=['#fff','#1a1a1a','#fff','#fff'];
function cardText(i){return CARD_TEXT[i%4];}

setInterval(()=>{
  const now=new Date();
  document.getElementById('time-display').textContent=
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
},1000);

// ── WebSocket + heartbeat ──
function connect(cb) {
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(`${proto}://${location.host}`);
  S.ws=ws;
  ws.onopen=()=>{ if(cb) cb(); startHeartbeat(); startBgMusic(); };
  ws.onerror=()=>showNotif('اتصال برقرار نشد ❌');
  ws.onclose=()=>{ showNotif('اتصال قطع شد'); stopHeartbeat(); };
  ws.onmessage=(e)=>handleMsg(JSON.parse(e.data));
}
function send(obj){if(S.ws&&S.ws.readyState===1) S.ws.send(JSON.stringify(obj));}

let heartbeatInterval=null;
function startHeartbeat(){
  heartbeatInterval=setInterval(()=>{
    if(S.ws&&S.ws.readyState===1) S.ws.send(JSON.stringify({type:'ping'}));
  },20000);
}
function stopHeartbeat(){if(heartbeatInterval){clearInterval(heartbeatInterval);heartbeatInterval=null;}}

function handleMsg(msg) {
  if(msg.type==='error'){showError(msg.msg);return;}
  if(msg.type==='notify'){
    showNotif(msg.text);
    if(msg.text.includes('وارد شد')) sfxJoin();
    return;
  }
  if(msg.type==='joined'){S.id=msg.id;S.isHost=msg.isHost;S.code=msg.code;return;}
  if(msg.type==='room_state'){
    const prevPhase=S.room?.phase;
    S.room=msg;
    if(msg.phase!==S.phase){
      S.phase=msg.phase;
      if(msg.phase==='playing'){S.answers={};S.myScoring={};S.timerLeft=msg.settings.timerSec;S.timerSec=msg.settings.timerSec;}
      if(msg.phase==='scoring'){S.myScoring={};}
      if(msg.phase==='leaderboard'){sfxFinish(); setBgMusicVolume(0.04);}
      else{setBgMusicVolume(0.07);}
    }
    if(msg.finishedByName&&msg.phase==='scoring'&&prevPhase==='playing'){
      showNotif(msg.isTimer?'⏰ وقت تموم شد!':'🏁 '+msg.finishedByName+' بازی رو تموم کرد!');
    }
    render();return;
  }
  if(msg.type==='timer_tick'){S.timerLeft=msg.timeLeft;updateTimerUI();return;}
}

function showNotif(text){
  const old=document.querySelector('.notif');if(old) old.remove();
  const el=document.createElement('div');
  el.className='notif';el.textContent=text;
  document.body.appendChild(el);
  clearTimeout(S.notifTimeout);
  S.notifTimeout=setTimeout(()=>el.remove(),3500);
}
function showError(text){
  const el=document.createElement('div');
  el.className='notif';el.textContent=text;
  el.style.borderColor='rgba(232,36,42,.7)';el.style.color='#FF6B6B';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function render(){
  const sc=document.getElementById('screen');
  const ph=S.room?S.room.phase:S.phase;
  if(ph==='lobby') renderLobby(sc);
  else if(ph==='playing'){
    // اگه صفحه بازی از قبل رندر شده (و فاز عوض نشده)، فقط دکمه finish رو آپدیت کن
    // تا focus و مقدار inputها از دست نره
    if(S._renderedPhase==='playing' && sc.querySelector('#finish-btn')) { checkFinishBtn(); return; }
    S._renderedPhase='playing';
    renderPlaying(sc);
  }
  else {
    S._renderedPhase=ph;
    if(ph==='scoring') renderScoring(sc);
    else if(ph==='waiting_confirm') renderWaitingConfirm(sc);
    else if(ph==='leaderboard') renderLeaderboard(sc);
    else renderConnect(sc);
  }
}

function checkFinishBtn(){
  const btn=document.getElementById('finish-btn');
  if(!btn||!S.room)return;
  const filledAll=S.room.cats.every((_,i)=>(S.answers[i]||'').trim().length>0);
  btn.disabled=!filledAll;
  btn.textContent=filledAll?'🏁 تموم شد! نتیجه رو ببین':'⏳ همه فیلدها رو پر کن';
}

function updateTimerUI(){
  const circle=document.getElementById('timer-circle'),numEl=document.getElementById('timer-num');
  if(!circle||!numEl)return;
  const room=S.room;if(!room||!room.settings.timerOn)return;
  const pct=S.timerLeft/S.timerSec,c=2*Math.PI*26;
  const col=pct>.4?'#4ADE80':pct>.2?'#F5D800':'#FF6B6B';
  circle.style.strokeDasharray=`${c*pct} ${c}`;circle.style.stroke=col;
  numEl.textContent=S.timerLeft;numEl.style.color=col;
}

let syncTimer=null;
function syncAnswers(){clearTimeout(syncTimer);syncTimer=setTimeout(()=>send({type:'submit_answers',answers:S.answers}),300);}
function finishRound(){
  const filledAll=S.room&&S.room.cats.every((_,i)=>(S.answers[i]||'').trim().length>0);
  if(!filledAll){showError('همه فیلدها رو پر کن!');return;}
  sfxFinish();
  syncAnswers();
  send({type:'finish_round',answers:S.answers});
}

  if(!S.room)return;

  const myScore=catsWithAnswer.reduce((s,{i})=>{const o=SCORE_OPTS.find(x=>x.key===S.myScoring[i]);return s+(o?o.pts:0);},0);

  const myScoringHTML=catsWithAnswer.length===0
    ?`<div style="text-align:center;color:rgba(255,255,255,.4);padding:24px;font-size:13px;">هیچ جوابی وارد نکردی — امتیاز ۰</div>`
    :catsWithAnswer.map(({cat,i,ans},idx)=>{
        const picked=S.myScoring[i];
        const opt=SCORE_OPTS.find(o=>o.key===picked);
        const cc=cardColor(idx);
        return `
        <div class="pz-card ${cc}" style="animation:fadeUp .3s ease ${idx*.05}s both;${picked?'opacity:1':''}">
          <div class="cat-label">
            <span class="cat-emoji">${CAT_EMOJI[cat]||'📝'}</span>
            <span class="cat-name" style="color:${cardText(idx)==='#fff'?'rgba(255,255,255,.9)':'rgba(0,0,0,.7)'};">${cat}</span>
          </div>
          <div style="background:rgba(0,0,0,.25);border-radius:10px;padding:10px 13px;font-size:15px;font-weight:800;color:#fff;margin-bottom:2px;">${ans}</div>
          <div class="score-btns">
            ${SCORE_OPTS.map(o=>`
              <button class="score-btn" data-key="${o.key}" data-action="pick-score" data-idx="${i}" data-score="${o.key}"
                style="${picked===o.key?`border-color:${o.border};background:${o.bg};color:${o.color};`:'border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);'}"
              >
                <div class="sb-emoji">${o.emoji}</div>
                <div class="sb-label">${o.label}</div>
                <div class="sb-pts">+${o.pts}</div>
              </button>`).join('')}
          </div>
        </div>`;
      }).join('');

  sc.innerHTML=`
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
      ${finisher?`
        <div style="padding:14px 18px 0;">
          <div class="finished-banner" style="background:linear-gradient(135deg,rgba(232,36,42,.25),rgba(192,24,29,.2));border:2px solid var(--red);">
            <p style="font-size:15px;font-weight:800;color:#FF6B6B;">🏁 ${finisher.name} بازی رو تموم کرد!</p>
          </div>
        </div>`:''}

      <div style="padding:14px 18px 0;">
        <p style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:10px;font-weight:700;">📋 پاسخ‌های همه بازیکنان</p>
        <div style="overflow-x:auto;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.1);border-radius:16px;">
          <table class="results-table"><thead><tr><th>دسته</th>${headerCells}</tr></thead><tbody>${tableRows}</tbody></table>
        </div>
      </div>

      <div style="padding:14px 18px 0;">
        <p style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:10px;font-weight:700;">⭐ امتیاز به جواب‌های خودت</p>
        <div style="display:flex;flex-direction:column;gap:10px;padding-bottom:160px;">${myScoringHTML}</div>
      </div>
    </div>

    <div class="fab" style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.15);border-radius:16px;padding:12px 18px;">
        <span style="font-size:13px;color:rgba(255,255,255,.6);font-weight:600;">جمع این دور</span>
        <span id="my-total-score" style="font-size:24px;font-weight:900;color:#F5D800;">⭐ ${myScore}</span>
      </div>
      ${alreadySubmitted
        ?`<div style="text-align:center;color:#4ADE80;font-size:13px;font-weight:800;padding:12px;background:rgba(24,184,74,.15);border-radius:14px;border:2px solid rgba(24,184,74,.3);">✅ امتیازت ثبت شد — منتظر بقیه...</div>`
        :`<button id="submit-score-btn" class="btn btn-yellow" data-action="submit-scoring" ${allPicked?'':' disabled'} style="${allPicked?'':'filter:grayscale(.5);'}">
            ${allPicked?'✅ ثبت امتیازها':'⏳ '+(catsWithAnswer.length-totalPicked)+' مورد مانده'}
          </button>`}
    </div>`;
}

function pickScore(i,key){
  sfxScore(key);
  S.myScoring[i]=key;
  // فقط دکمه‌های همون کارت رو آپدیت کن — scroll حفظ میشه
  updateScoreCard(i,key);
  updateSubmitBtn();
}

function updateScoreCard(idx,key){
  const room=S.room;if(!room)return;
  const me=room.players.find(p=>p.id===S.id);
  const myAnswers=me?.answers||{};
  const catsWithAnswer=room.cats.map((cat,ci)=>({cat,ci,ans:(myAnswers[ci]||'').trim()})).filter(x=>x.ans);
  // پیدا کردن کارت مربوط به این index
  const cardIdx=catsWithAnswer.findIndex(x=>x.ci===idx);
  if(cardIdx<0)return;
  const cardEl=document.querySelectorAll('.score-btns')[cardIdx];
  if(!cardEl)return;
  SCORE_OPTS.forEach(o=>{
    const btn=cardEl.querySelector('[data-key="'+o.key+'"]'  );
    if(!btn)return;
    if(key===o.key){
      btn.style.borderColor=o.border;btn.style.background=o.bg;btn.style.color=o.color;
    } else {
      btn.style.borderColor='rgba(255,255,255,.15)';btn.style.background='rgba(255,255,255,.06)';btn.style.color='rgba(255,255,255,.5)';
    }
  });
  // آپدیت امتیاز کل
  const allCatsW=room.cats.map((cat,i)=>({cat,i,ans:(myAnswers[i]||'').trim()})).filter(x=>x.ans);
  const myScore=allCatsW.reduce((s,{i})=>{const o=SCORE_OPTS.find(x=>x.key===S.myScoring[i]);return s+(o?o.pts:0);},0);
  const scoreEl=document.getElementById('my-total-score');
  if(scoreEl) scoreEl.textContent='⭐ '+myScore;
}

function updateSubmitBtn(){
  const room=S.room;if(!room)return;
  const me=room.players.find(p=>p.id===S.id);
  const myAnswers=me?.answers||{};
  const catsWithAnswer=room.cats.map((_,i)=>i).filter(i=>(myAnswers[i]||'').trim());
  const allPicked=catsWithAnswer.every(i=>S.myScoring[i]!==undefined);
  const remaining=catsWithAnswer.filter(i=>S.myScoring[i]===undefined).length;
  const btn=document.getElementById('submit-score-btn');
  if(!btn)return;
  btn.disabled=!allPicked;
  btn.textContent=allPicked?'✅ ثبت امتیازها':'⏳ '+remaining+' مورد مانده';
  btn.style.filter=allPicked?'':'grayscale(.5)';
  const myAnswers2=me?.answers||{};
  const allCatsW=room.cats.map((cat,i)=>({cat,i,ans:(myAnswers2[i]||'').trim()})).filter(x=>x.ans);
  const myScore=allCatsW.reduce((s,{i})=>{const o=SCORE_OPTS.find(x=>x.key===S.myScoring[i]);return s+(o?o.pts:0);},0);
  const scoreEl=document.getElementById('my-total-score');
  if(scoreEl) scoreEl.textContent='⭐ '+myScore;
}
function submitScoring(){
  const room=S.room;
  const me=room?.players.find(p=>p.id===S.id);
  const myAnswers=me?.answers||{};
  const catsWithAnswer=room.cats.map((_,i)=>i).filter(i=>(myAnswers[i]||'').trim());
  const allPicked=catsWithAnswer.every(i=>S.myScoring[i]!==undefined);
  if(!allPicked){showError('همه جواب‌هات رو امتیاز بده!');return;}
  sfxSubmit();
  send({type:'submit_scoring',scoring:S.myScoring});
  showNotif('امتیازها ثبت شد ✅');
}

// ══════════════════════════════════════════════════════════════════════════
// SCREEN: Waiting Confirm
// ══════════════════════════════════════════════════════════════════════════
function renderWaitingConfirm(sc){
  if(!S.room)return;
  const room=S.room;
  const submitted=room.players.filter(p=>p.scoringSubmitted);
  const notSubmitted=room.players.filter(p=>!p.scoringSubmitted);
  const allDone=notSubmitted.length===0;

  const playersList=room.players.map((p,idx)=>`
    <div class="wait-player">
      <div class="avatar ${avatarClass(idx)}" style="${p.scoringSubmitted?'background:var(--green);':''}">
        ${p.scoringSubmitted?'✅':p.name.charAt(0)}
      </div>
      <span style="flex:1;font-size:14px;font-weight:700;color:#fff;">${p.name}${p.id===S.id?' <span style="font-size:11px;opacity:.5">(تو)</span>':''}</span>
      <span style="font-size:12px;font-weight:800;padding:5px 12px;border-radius:99px;
        background:${p.scoringSubmitted?'rgba(24,184,74,.2)':'rgba(255,255,255,.07)'};
        color:${p.scoringSubmitted?'#4ADE80':'rgba(255,255,255,.4)'};
        border:2px solid ${p.scoringSubmitted?'#18B84A':'rgba(255,255,255,.1)'};">
        ${p.scoringSubmitted?'✅ ثبت شد':'⏳ در حال...'}
      </span>
    </div>`).join('');

  sc.innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:20px 16px 120px;display:flex;flex-direction:column;gap:16px;">
      <div class="pz-card ${allDone?'green':'blue'}" style="text-align:center;animation:popIn .4s ease;">
        <div style="font-size:52px;margin-bottom:10px;">${allDone?'🎉':'⏳'}</div>
        <h2 style="font-size:20px;font-weight:900;color:#fff;">${allDone?'همه ثبت کردن!':'در انتظار ثبت امتیازها'}</h2>
        <p style="font-size:12px;color:rgba(255,255,255,.7);margin-top:6px;">${allDone?'هاست می‌تونه جدول رو نشون بده':'منتظر بقیه...'}</p>
      </div>

      <div class="wait-card">
        <p style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:12px;font-weight:700;">📊 وضعیت ثبت امتیاز</p>
        ${playersList}
        <div style="margin-top:14px;background:rgba(255,255,255,.08);border-radius:99px;height:8px;overflow:hidden;">
          <div style="height:100%;width:${Math.round(submitted.length/room.players.length*100)}%;background:linear-gradient(90deg,var(--green),#4ADE80);border-radius:99px;transition:width .5s;"></div>
        </div>
        <p style="font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:8px;">${submitted.length} از ${room.players.length} نفر ثبت کردن</p>
      </div>
    </div>

    <div class="fab">
      ${S.isHost
        ?`<button class="btn btn-${allDone?'yellow':'ghost'}" data-action="confirm-leaderboard" ${allDone?'':' disabled'}>
            ${allDone?'📊 نمایش جدول امتیازات':'⏳ منتظر '+notSubmitted.length+' نفر...'}
          </button>`
        :`<div style="text-align:center;color:rgba(255,255,255,.4);font-size:13px;padding:12px;background:rgba(255,255,255,.05);border-radius:14px;">⏳ منتظر تایید هاست...</div>`}
    </div>`;
}
function confirmLeaderboard(){send({type:'confirm_leaderboard'});}

// ══════════════════════════════════════════════════════════════════════════
// SCREEN: Leaderboard
// ══════════════════════════════════════════════════════════════════════════
function renderLeaderboard(sc){
  if(!S.room)return;
  const room=S.room;
  const sorted=[...room.players].sort((a,b)=>b.totalScore-a.totalScore);
  const medals=['🥇','🥈','🥉'];
  const rankClasses=['rank-1','rank-2','rank-3','rank-other'];

  const rows=sorted.map((p,idx)=>`
    <div class="lb-row ${rankClasses[Math.min(idx,3)]}" style="animation:fadeUp .3s ease ${idx*.08}s both;">
      <div class="lb-rank">${medals[idx]||idx+1}</div>
      <div style="flex:1;">
        <div class="lb-name">${p.name}${p.id===S.id?' <span style="font-size:11px;opacity:.6">(تو)</span>':''}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.5);font-weight:600;">این دور: +${p.roundScore}</div>
      </div>
      <div class="lb-score">${p.totalScore}</div>
    </div>`).join('');

  const historyHTML=(room.roundHistory||[]).length>1?`
    <div style="padding:14px 18px 0;">
      <p style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:10px;font-weight:700;">📈 تاریخچه دورها</p>
      <div style="overflow-x:auto;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.1);border-radius:16px;">
        <table class="results-table">
          <thead><tr><th>دور</th>${sorted.map(p=>`<th style="text-align:center;">${p.name}</th>`).join('')}</tr></thead>
          <tbody>
            ${(room.roundHistory||[]).map(h=>`
              <tr><td>دور ${h.round} (${h.letter})</td>
                ${sorted.map(p=>{const hs=h.scores.find(s=>s.id===p.id);return `<td style="text-align:center;color:#F5D800;font-weight:800;">+${hs?hs.roundScore:0}</td>`;}).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`:''

  const orderedHeaders=room.players.map(p=>`<th style="text-align:center;">${p.name}</th>`).join('');
  const scoringDetailHTML=room.cats.map((cat,i)=>{
    const cells=room.players.map(p=>{
      const ans=(p.answers||{})[i]||'';
      const score=(p.scoring||{})[i];
      const opt=SCORE_OPTS.find(o=>o.key===score);
      return `<td style="text-align:center;"><div style="font-size:12px;">${ans||'—'}</div>${ans&&score?`<div style="font-size:10px;color:${opt?.color};">${opt?.emoji} ${opt?.pts}</div>`:''}</td>`;
    }).join('');
    return `<tr><td style="min-width:100px;font-size:12px;">${CAT_EMOJI[cat]||'📝'} ${cat}</td>${cells}</tr>`;
  }).join('');

  sc.innerHTML=`
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
      <div class="pz-card yellow" style="margin:16px 16px 0;text-align:center;animation:popIn .5s ease;">
        <div style="font-size:52px;margin-bottom:8px;">🏆</div>
        <h2 style="font-size:24px;font-weight:900;color:#1a1a1a;">جدول امتیازات</h2>
        <p style="font-size:12px;color:rgba(0,0,0,.5);margin-top:4px;font-weight:600;">دور ${room.round}</p>
      </div>

      <div style="padding:14px 16px 0;">${rows}</div>
      ${historyHTML}

      <div style="padding:14px 18px 0;">
        <p style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:10px;font-weight:700;">📋 جزئیات امتیازها</p>
        <div style="overflow-x:auto;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.1);border-radius:16px;margin-bottom:110px;">
          <table class="results-table">
            <thead><tr><th>دسته</th>${orderedHeaders}</tr></thead>
            <tbody>${scoringDetailHTML}</tbody>
          </table>
        </div>
      </div>
    </div>

    ${S.isHost?`
    <div class="fab"><button class="btn btn-red" data-action="next-round">🎮 دور بعدی</button></div>`:`
    <div class="fab"><div style="text-align:center;color:rgba(255,255,255,.4);font-size:13px;padding:12px;background:rgba(255,255,255,.05);border-radius:14px;">⏳ منتظر هاست برای شروع دور بعدی...</div></div>`}`;
}

function nextRound(){send({type:'next_round'});}

// ── میوت و بازگشت به خانه ──
let isMuted = false;

function toggleMute() {
  isMuted = !isMuted;
  if(bgGain) bgGain.volume = isMuted ? 0 : 0.35;
  const btn = document.getElementById('btn-mute');
  if(btn) btn.textContent = isMuted ? '🔇' : '🔊';
}

function goHome() {
  const inGame = S.room && S.phase !== 'connect';
  if(inGame) {
    if(!confirm('مطمئنی میخوای برگردی به خانه؟ بازی قطع میشه!')) return;
  }
  if(S.ws) { S.ws.close(); S.ws = null; }
  S.room = null; S.phase = 'connect'; S.id = null; S.isHost = false; S.code = null;
  S.answers = {}; S.myScoring = {}; S._renderedPhase = null;
  stopHeartbeat();
  render();
}

// ══════════════════════════════════════════════════════════════════════════
// Event Delegation — جایگزین همه inline onclick/oninput ها
// ══════════════════════════════════════════════════════════════════════════
document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  switch(action) {
    // ── Connect screen ──
    case 'go-home':      goHome(); break;
    case 'toggle-mute':  toggleMute(); break;

    // ── Connect screen ──
    case 'tab-create': setTab('create'); sfxClick(); break;
    case 'tab-join':   setTab('join');   sfxClick(); break;
    case 'toggle-pass': togglePassView(el.dataset.target); break;
    case 'do-create':  doCreate(); sfxSubmit(); break;
    case 'do-join':    doJoin();   sfxSubmit(); break;

    // ── Lobby ──
    case 'toggle-timer': toggleTimer(); sfxClick(); break;
    case 'set-preset':
      setPreset(+el.dataset.value); sfxClick(); break;
    case 'ready-true':  setReady(true);  sfxSubmit(); break;
    case 'ready-false': setReady(false); sfxClick();  break;
    case 'start-game':  startGame();     sfxSubmit(); break;

    // ── Playing ──
    case 'finish-round': finishRound(); break;

    // ── Scoring ──
    case 'pick-score':
      pickScore(+el.dataset.idx, el.dataset.score); break;
    case 'submit-scoring': submitScoring(); break;

    // ── Waiting Confirm ──
    case 'confirm-leaderboard': confirmLeaderboard(); sfxSubmit(); break;

    // ── Leaderboard ──
    case 'next-round': nextRound(); sfxSubmit(); break;
  }
});

document.addEventListener('input', function(e) {
  const el = e.target;
  const action = el.dataset.action;
  if (!action) return;

  switch(action) {
    case 'sfxType': sfxType(); break;
    case 'timer-range': updateTimerSetting(el.value); break;
    case 'answer-input':
      const idx = +el.dataset.idx;
      S.answers[idx] = el.value;
      syncAnswers();
      checkFinishBtn();
      sfxType();
      break;
  }
});

renderConnect(document.getElementById('screen'));
</script>
